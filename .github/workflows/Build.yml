name: Build Windows EXE for ACF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl pillow xlwings

      - name: Build EXE
        run: |
          pyinstaller --onefile --console --name ACF_Report_Generator "ACF_Auto Report.py"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACF_Report_Generator_Windows
          path: dist/ACF_Report_Generator.exe
